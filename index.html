<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BagBot — Gestion</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #080c10;
            --surface: #0e1419;
            --surface2: #111820;
            --border: #1e2830;
            --accent: #00d4ff;
            --accent2: #00ff9d;
            --text: #c8d8e8;
            --muted: #4a6070;
            --danger: #ff4560;
            --warn: #ffb020;
            --mono: 'Space Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
            background-size: 40px 40px;
            pointer-events: none;
            z-index: 0;
        }

        /* ── Header ── */
        header {
            position: relative;
            z-index: 10;
            border-bottom: 1px solid var(--border);
            padding: 0 32px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            height: 60px;
            background: var(--surface);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 20px;
            font-weight: 800;
        }

        .brand-icon { color: var(--accent); font-size: 22px; }
        .brand span { color: var(--accent); }

        .header-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .status-dot {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: var(--mono);
            font-size: 11px;
            color: var(--muted);
        }

        .dot {
            width: 8px; height: 8px;
            border-radius: 50%;
            background: var(--accent2);
            box-shadow: 0 0 8px var(--accent2);
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .btn-logout {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 1px;
            color: var(--muted);
            text-decoration: none;
            border: 1px solid var(--border);
            padding: 6px 14px;
            transition: all 0.2s;
        }

        .btn-logout:hover { color: var(--danger); border-color: var(--danger); }

        /* ── Layout ── */
        .container {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 32px 24px;
        }

        /* ── Section title ── */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .section-title {
            font-family: var(--mono);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: var(--muted);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .section-title::before {
            content: '';
            display: block;
            width: 3px;
            height: 14px;
            background: var(--accent);
        }

        /* ── Subnet cards ── */
        .subnet-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(460px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }

        .subnet-card {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 20px 24px;
            transition: border-color 0.2s;
            position: relative;
        }

        .subnet-card::before {
            content: '';
            position: absolute;
            top: 0; left: 0;
            width: 3px; height: 100%;
            background: var(--accent);
            opacity: 0;
            transition: opacity 0.2s;
        }

        .subnet-card:hover { border-color: rgba(0,212,255,0.3); }
        .subnet-card:hover::before { opacity: 1; }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .subnet-id {
            font-size: 18px;
            font-weight: 800;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .subnet-badge {
            font-family: var(--mono);
            font-size: 10px;
            background: rgba(0,212,255,0.1);
            border: 1px solid rgba(0,212,255,0.2);
            color: var(--accent);
            padding: 2px 8px;
            letter-spacing: 1px;
        }

        .btn-delete {
            background: transparent;
            border: 1px solid rgba(255,69,96,0.3);
            color: var(--danger);
            font-family: var(--mono);
            font-size: 11px;
            padding: 5px 12px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .btn-delete:hover {
            background: rgba(255,69,96,0.1);
            border-color: var(--danger);
        }

        /* ── Inline fields ── */
        .fields-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 16px;
        }

        .field-group {
            background: var(--bg);
            border: 1px solid var(--border);
            padding: 10px 12px;
        }

        .field-group.buy { border-left: 2px solid var(--accent2); }
        .field-group.sell { border-left: 2px solid var(--danger); }
        .field-group.neutral { border-left: 2px solid var(--muted); }

        .field-label {
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .field-row {
            display: flex;
            gap: 8px;
            align-items: center;
        }

        .field-sub-label {
            font-family: var(--mono);
            font-size: 9px;
            color: var(--muted);
            min-width: 28px;
        }

        .field-input {
            flex: 1;
            background: transparent;
            border: none;
            border-bottom: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 2px 4px;
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }

        .field-input:focus { border-bottom-color: var(--accent); }

        .card-actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-save {
            background: transparent;
            border: 1px solid var(--accent);
            color: var(--accent);
            font-family: var(--mono);
            font-size: 11px;
            padding: 8px 20px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
            position: relative;
            overflow: hidden;
        }

        .btn-save::before {
            content: '';
            position: absolute;
            inset: 0;
            background: var(--accent);
            transform: translateX(-100%);
            transition: transform 0.2s;
        }

        .btn-save:hover::before { transform: translateX(0); }
        .btn-save:hover { color: var(--bg); }
        .btn-save span { position: relative; z-index: 1; }

        /* ── Add subnet form ── */
        .add-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-style: dashed;
            padding: 28px 24px;
        }

        .add-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin: 20px 0;
        }

        .add-field label {
            display: block;
            font-family: var(--mono);
            font-size: 9px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .add-field input {
            width: 100%;
            background: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            font-family: var(--mono);
            font-size: 13px;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .add-field input:focus { border-color: var(--accent); }

        .add-actions {
            display: flex;
            justify-content: flex-end;
        }

        .btn-add {
            background: rgba(0,255,157,0.08);
            border: 1px solid var(--accent2);
            color: var(--accent2);
            font-family: var(--mono);
            font-size: 11px;
            padding: 10px 24px;
            cursor: pointer;
            transition: all 0.2s;
            letter-spacing: 1px;
        }

        .btn-add:hover { background: rgba(0,255,157,0.15); }

        /* ── Toast ── */
        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1000;
            font-family: var(--mono);
            font-size: 12px;
            padding: 12px 20px;
            border: 1px solid;
            max-width: 360px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.3s;
            pointer-events: none;
        }

        .toast.show { opacity: 1; transform: translateY(0); }
        .toast.success { background: rgba(0,255,157,0.1); border-color: var(--accent2); color: var(--accent2); }
        .toast.error { background: rgba(255,69,96,0.1); border-color: var(--danger); color: var(--danger); }

        /* ── Empty state ── */
        .empty {
            text-align: center;
            padding: 60px;
            color: var(--muted);
            font-family: var(--mono);
            font-size: 13px;
        }
    </style>
</head>
<body>

<header>
    <div class="brand">
        <span class="brand-icon">⬡</span>
        Bag<span>Bot</span>
    </div>
    <div class="header-right">
        <div class="status-dot">
            <div class="dot"></div>
            Bot actif
        </div>
        <a href="/logout" class="btn-logout">Déconnexion</a>
    </div>
</header>

<div class="container">

    <!-- Subnets actifs -->
    <div class="section-header">
        <div class="section-title">Subnets configurés</div>
        <div style="font-family:var(--mono);font-size:11px;color:var(--muted);">
            {{ subnets|length }} subnet(s) actif(s)
        </div>
    </div>

    <div class="subnet-grid" id="subnetGrid">
        {% if subnets %}
            {% for netuid, cfg in subnets.items()|sort %}
            <div class="subnet-card" id="card-{{ netuid }}">
                <div class="card-header">
                    <div class="subnet-id">
                        SN{{ netuid }}
                        <span class="subnet-badge">ACTIF</span>
                    </div>
                    <button class="btn-delete" onclick="deleteSubnet({{ netuid }})">✕ Supprimer</button>
                </div>

                <div class="fields-grid">
                    <div class="field-group buy">
                        <div class="field-label">Achat</div>
                        <div class="field-row">
                            <span class="field-sub-label">LOW</span>
                            <input class="field-input" type="number" step="any"
                                id="buy_lower_{{ netuid }}" value="{{ cfg.buy_lower }}">
                        </div>
                        <div class="field-row" style="margin-top:6px">
                            <span class="field-sub-label">HIGH</span>
                            <input class="field-input" type="number" step="any"
                                id="buy_upper_{{ netuid }}" value="{{ cfg.buy_upper }}">
                        </div>
                    </div>

                    <div class="field-group sell">
                        <div class="field-label">Vente</div>
                        <div class="field-row">
                            <span class="field-sub-label">LOW</span>
                            <input class="field-input" type="number" step="any"
                                id="sell_lower_{{ netuid }}" value="{{ cfg.sell_lower }}">
                        </div>
                        <div class="field-row" style="margin-top:6px">
                            <span class="field-sub-label">HIGH</span>
                            <input class="field-input" type="number" step="any"
                                id="sell_upper_{{ netuid }}" value="{{ cfg.sell_upper }}">
                        </div>
                    </div>

                    <div class="field-group neutral" style="grid-column: span 2;">
                        <div class="field-label">Max Alpha</div>
                        <div class="field-row">
                            <input class="field-input" type="number" step="any"
                                id="max_alpha_{{ netuid }}" value="{{ cfg.max_alpha }}">
                        </div>
                    </div>
                </div>

                <div class="card-actions">
                    <button class="btn-save" onclick="saveSubnet({{ netuid }})">
                        <span>✓ Sauvegarder</span>
                    </button>
                </div>
            </div>
            {% endfor %}
        {% else %}
            <div class="empty">Aucun subnet configuré</div>
        {% endif %}
    </div>

    <!-- Ajouter un subnet -->
    <div class="section-header">
        <div class="section-title">Ajouter un subnet</div>
    </div>

    <div class="add-card">
        <div class="add-grid">
            <div class="add-field">
                <label>Subnet ID (netuid)</label>
                <input type="number" id="new_netuid" placeholder="ex: 70" min="1">
            </div>
            <div class="add-field">
                <label>Buy Lower</label>
                <input type="number" id="new_buy_lower" step="any" placeholder="ex: 0.0022">
            </div>
            <div class="add-field">
                <label>Buy Upper</label>
                <input type="number" id="new_buy_upper" step="any" placeholder="ex: 0.0035">
            </div>
            <div class="add-field">
                <label>Sell Lower</label>
                <input type="number" id="new_sell_lower" step="any" placeholder="ex: 0.0150">
            </div>
            <div class="add-field">
                <label>Sell Upper</label>
                <input type="number" id="new_sell_upper" step="any" placeholder="ex: 0.0200">
            </div>
            <div class="add-field">
                <label>Max Alpha</label>
                <input type="number" id="new_max_alpha" step="any" placeholder="ex: 60">
            </div>
        </div>
        <div class="add-actions">
            <button class="btn-add" onclick="addSubnet()">+ Ajouter le subnet</button>
        </div>
    </div>

</div>

<!-- Toast notification -->
<div class="toast" id="toast"></div>

<script>
function showToast(msg, type='success') {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.className = `toast ${type} show`;
    setTimeout(() => t.classList.remove('show'), 3500);
}

async function saveSubnet(netuid) {
    const data = {
        netuid     : netuid,
        buy_lower  : document.getElementById(`buy_lower_${netuid}`).value,
        buy_upper  : document.getElementById(`buy_upper_${netuid}`).value,
        sell_lower : document.getElementById(`sell_lower_${netuid}`).value,
        sell_upper : document.getElementById(`sell_upper_${netuid}`).value,
        max_alpha  : document.getElementById(`max_alpha_${netuid}`).value,
    };

    const r = await fetch('/api/subnet/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const res = await r.json();

    if (res.success) {
        showToast(`✓ SN${netuid} sauvegardé — le bot rechargera au prochain tick`, 'success');
    } else {
        showToast(`⚠ ${res.error}`, 'error');
    }
}

async function deleteSubnet(netuid) {
    if (!confirm(`Supprimer SN${netuid} de la config ?`)) return;

    const r = await fetch('/api/subnet/delete', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({netuid})
    });
    const res = await r.json();

    if (res.success) {
        document.getElementById(`card-${netuid}`)?.remove();
        showToast(`✓ SN${netuid} supprimé — le bot rechargera au prochain tick`, 'success');
    } else {
        showToast(`⚠ ${res.error}`, 'error');
    }
}

async function addSubnet() {
    const data = {
        netuid     : document.getElementById('new_netuid').value,
        buy_lower  : document.getElementById('new_buy_lower').value,
        buy_upper  : document.getElementById('new_buy_upper').value,
        sell_lower : document.getElementById('new_sell_lower').value,
        sell_upper : document.getElementById('new_sell_upper').value,
        max_alpha  : document.getElementById('new_max_alpha').value,
    };

    if (!data.netuid) { showToast('⚠ Subnet ID requis', 'error'); return; }

    const r = await fetch('/api/subnet/save', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify(data)
    });
    const res = await r.json();

    if (res.success) {
        showToast(`✓ SN${data.netuid} ajouté — rechargement de la page...`, 'success');
        setTimeout(() => location.reload(), 1500);
    } else {
        showToast(`⚠ ${res.error}`, 'error');
    }
}
</script>

</body>
</html>
